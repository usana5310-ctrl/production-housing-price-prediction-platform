name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 737923406052.dkr.ecr.ap-south-1.amazonaws.com
  API_REPO: housing-api
  STREAMLIT_REPO: housing-streamlit

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # =========================
      # BUILD & PUSH API
      # =========================
      - name: Build and Push API Image
        run: |
          IMAGE_TAG=${GITHUB_SHA}

          docker build -t $ECR_REGISTRY/$API_REPO:$IMAGE_TAG -f Dockerfile .
          docker push $ECR_REGISTRY/$API_REPO:$IMAGE_TAG

          docker tag $ECR_REGISTRY/$API_REPO:$IMAGE_TAG $ECR_REGISTRY/$API_REPO:latest
          docker push $ECR_REGISTRY/$API_REPO:latest

      # =========================
      # BUILD & PUSH STREAMLIT
      # =========================
      - name: Build and Push Streamlit Image
        run: |
          IMAGE_TAG=${GITHUB_SHA}

          docker build -t $ECR_REGISTRY/$STREAMLIT_REPO:$IMAGE_TAG -f Dockerfile.streamlit .
          docker push $ECR_REGISTRY/$STREAMLIT_REPO:$IMAGE_TAG

          docker tag $ECR_REGISTRY/$STREAMLIT_REPO:$IMAGE_TAG $ECR_REGISTRY/$STREAMLIT_REPO:latest
          docker push $ECR_REGISTRY/$STREAMLIT_REPO:latest

      # =========================
      # DEPLOY API SERVICE
      # =========================
      - name: Deploy API to ECS
        run: |
          aws ecs update-service \
            --cluster housing-api-cluster-ecs \
            --service housing-api-service \
            --force-new-deployment

      # =========================
      # DEPLOY STREAMLIT SERVICE
      # =========================
      - name: Deploy Streamlit to ECS
        run: |
          aws ecs update-service \
            --cluster housing-api-cluster-ecs \
            --service housing-streamlit-service \
            --force-new-deployment